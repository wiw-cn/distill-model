name: Generate Distillation Data

on:
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点UTC运行
  workflow_dispatch:  # 支持手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate data
        env:
          API_KEY: ${{ secrets.API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          COUNT: ${{ secrets.COUNT || '500' }}
          WORKERS: ${{ secrets.WORKERS || '5' }}
          OUTPUT_DIR: ${{ github.workspace }}/data
        run: python distill_generate.py --concurrent

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || (git commit -m "Auto-generate distillation data $(date +%Y%m%d)" && git push)
